# Render Blueprint — VelvetCreator (web + Postgres)
# Apply: Dashboard → Blueprints → New Blueprint Instance → connect this repo

services:
  - type: web
    name: velvetcreator
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run db:generate && npm run db:push && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: velvetcreator-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: PAYMENTS_MODE
        value: mock
      - key: MOCK_PAYMENT_AUTO_SUCCEED
        value: "true"
      - key: ENABLE_CREATOR_PRO
        value: "true"
      - key: ENABLE_FAN_PLATFORM_PLUS
        value: "true"

databases:
  - name: velvetcreator-db
    plan: free
    region: oregon
    databaseName: creator_platform
    user: creator
    postgresMajorVersion: "16"
